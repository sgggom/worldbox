<!doctype html>
<html lang="zh-CN" data-theme="paper">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>纸页与荧屏</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=LXGW+WenKai+Mono+TC&family=Ma+Shan+Zheng&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0e6d0;
      --bg-accent: #e2d2b4;
      --bg-spot-a: rgba(255, 240, 210, 0.5);
      --bg-spot-b: rgba(211, 180, 127, 0.25);
      --bg-spot-c: rgba(180, 155, 110, 0.15);
      --panel: rgba(255, 250, 240, 0.88);
      --panel-strong: rgba(255, 248, 234, 0.96);
      --text: #2e2013;
      --muted: #7a6a52;
      --line: rgba(102, 77, 46, 0.18);
      --accent: #9e5a20;
      --accent-strong: #7a4215;
      --accent-glow: rgba(158, 90, 32, 0.25);
      --accent-text: #fffaf2;
      --user-bg: rgba(158, 90, 32, 0.10);
      --assistant-bg: rgba(255, 255, 255, 0.62);
      --system-bg: rgba(77, 58, 39, 0.06);
      --input-bg: rgba(255, 252, 245, 0.94);
      --glass-bg: color-mix(in srgb, var(--panel-strong) 68%, transparent);
      --glass-bg-soft: color-mix(in srgb, var(--panel) 54%, transparent);
      --glass-bg-strong: color-mix(in srgb, var(--panel-strong) 82%, transparent);
      --glass-edge: color-mix(in srgb, white 24%, var(--line));
      --glass-highlight: rgba(255, 255, 255, 0.22);
      --glass-shadow: 0 20px 60px rgba(0, 0, 0, 0.14), inset 0 1px 0 rgba(255,255,255,0.09), inset 0 -1px 0 rgba(255,255,255,0.03);
      --glass-blur: blur(26px) saturate(1.6);
      --shadow: 0 24px 80px rgba(82, 57, 27, 0.14), 0 4px 16px rgba(82, 57, 27, 0.08);
      --glow: none;
      --header-font: "Ma Shan Zheng", "STKaiti", "KaiTi", "Baskerville", serif;
      --body-font: "Noto Serif SC", "Songti SC", "Georgia", serif;
      --mono-font: "LXGW WenKai Mono TC", "Courier New", monospace;
      --texture-opacity: 0.07;
      --paper-line: rgba(120, 92, 62, 0.06);
      --cursor: rgba(158, 90, 32, 0.85);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --scroll-fade: linear-gradient(to bottom, transparent, var(--panel-strong) 48px, var(--panel-strong) calc(100% - 48px), transparent);
    }

    html[data-theme="crt"],
    body[data-theme="crt"] {
      --bg: #050e08;
      --bg-accent: #0a1f12;
      --bg-spot-a: rgba(92, 255, 136, 0.08);
      --bg-spot-b: rgba(20, 160, 70, 0.14);
      --bg-spot-c: rgba(0, 0, 0, 0.2);
      --panel: rgba(4, 18, 10, 0.92);
      --panel-strong: rgba(3, 12, 7, 0.97);
      --text: #8cf0a8;
      --muted: #4fad6a;
      --line: rgba(100, 240, 150, 0.14);
      --accent: #5cff88;
      --accent-strong: #28a050;
      --accent-glow: rgba(92, 255, 136, 0.12);
      --accent-text: #021a08;
      --user-bg: rgba(92, 255, 136, 0.07);
      --assistant-bg: rgba(6, 22, 12, 0.85);
      --system-bg: rgba(92, 255, 136, 0.04);
      --input-bg: rgba(2, 12, 6, 0.96);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 1px rgba(92, 255, 136, 0.3);
      --glow: 0 0 24px rgba(92, 255, 136, 0.08);
      --header-font: "Press Start 2P", "VT323", "Courier New", monospace;
      --body-font: "VT323", "Press Start 2P", "Courier New", monospace;
      --mono-font: "VT323", "Press Start 2P", "Courier New", monospace;
      --texture-opacity: 0;
      --paper-line: rgba(92, 255, 136, 0.04);
      --cursor: rgba(92, 255, 136, 0.88);
      --scroll-fade: linear-gradient(to bottom, transparent, var(--panel-strong) 48px, var(--panel-strong) calc(100% - 48px), transparent);
      letter-spacing: 0.04em;
      -webkit-font-smoothing: none;
      font-smooth: never;
    }

    html[data-theme="ink"],
    body[data-theme="ink"] {
      --bg: #11151c;
      --bg-accent: #202838;
      --bg-spot-a: rgba(126, 169, 255, 0.14);
      --bg-spot-b: rgba(88, 205, 186, 0.10);
      --bg-spot-c: rgba(9, 12, 18, 0.38);
      --panel: rgba(21, 26, 36, 0.88);
      --panel-strong: rgba(14, 18, 26, 0.96);
      --text: #e9eef8;
      --muted: #98a6bb;
      --line: rgba(158, 181, 214, 0.18);
      --accent: #7fb2ff;
      --accent-strong: #4b82d8;
      --accent-glow: rgba(127, 178, 255, 0.16);
      --accent-text: #07101d;
      --user-bg: rgba(127, 178, 255, 0.12);
      --assistant-bg: rgba(31, 39, 54, 0.78);
      --system-bg: rgba(127, 178, 255, 0.06);
      --input-bg: rgba(10, 14, 21, 0.94);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.48), 0 0 1px rgba(127, 178, 255, 0.28);
      --glow: 0 0 28px rgba(127, 178, 255, 0.08);
      --texture-opacity: 0.04;
      --paper-line: rgba(160, 185, 220, 0.05);
      --cursor: rgba(127, 178, 255, 0.9);
    }

    html[data-theme="blueprint"],
    body[data-theme="blueprint"] {
      --bg: #061a2c;
      --bg-accent: #0b3154;
      --bg-spot-a: rgba(68, 194, 255, 0.16);
      --bg-spot-b: rgba(255, 255, 255, 0.06);
      --bg-spot-c: rgba(38, 118, 180, 0.18);
      --panel: rgba(8, 39, 66, 0.88);
      --panel-strong: rgba(5, 28, 48, 0.96);
      --text: #d9f4ff;
      --muted: #8fc4dd;
      --line: rgba(122, 216, 255, 0.22);
      --accent: #44c2ff;
      --accent-strong: #1684c7;
      --accent-glow: rgba(68, 194, 255, 0.18);
      --accent-text: #031523;
      --user-bg: rgba(68, 194, 255, 0.12);
      --assistant-bg: rgba(10, 53, 88, 0.78);
      --system-bg: rgba(217, 244, 255, 0.06);
      --input-bg: rgba(4, 23, 40, 0.94);
      --shadow: 0 24px 80px rgba(0, 8, 20, 0.48), 0 0 1px rgba(68, 194, 255, 0.35);
      --glow: 0 0 32px rgba(68, 194, 255, 0.1);
      --header-font: "LXGW WenKai Mono TC", "Noto Serif SC", serif;
      --body-font: "LXGW WenKai Mono TC", "Noto Serif SC", serif;
      --texture-opacity: 0.08;
      --paper-line: rgba(122, 216, 255, 0.08);
      --cursor: rgba(68, 194, 255, 0.9);
    }

    html[data-theme="cherry"],
    body[data-theme="cherry"] {
      --bg: #241018;
      --bg-accent: #4a1724;
      --bg-spot-a: rgba(255, 122, 168, 0.16);
      --bg-spot-b: rgba(255, 201, 122, 0.08);
      --bg-spot-c: rgba(80, 12, 26, 0.32);
      --panel: rgba(55, 20, 33, 0.88);
      --panel-strong: rgba(38, 14, 24, 0.96);
      --text: #ffe8ee;
      --muted: #d7a0ad;
      --line: rgba(255, 173, 195, 0.20);
      --accent: #ff7aa8;
      --accent-strong: #c7436e;
      --accent-glow: rgba(255, 122, 168, 0.18);
      --accent-text: #240610;
      --user-bg: rgba(255, 122, 168, 0.12);
      --assistant-bg: rgba(72, 27, 42, 0.78);
      --system-bg: rgba(255, 232, 238, 0.06);
      --input-bg: rgba(32, 10, 20, 0.94);
      --shadow: 0 24px 80px rgba(20, 0, 8, 0.44), 0 0 1px rgba(255, 122, 168, 0.35);
      --glow: 0 0 30px rgba(255, 122, 168, 0.1);
      --texture-opacity: 0.05;
      --paper-line: rgba(255, 173, 195, 0.06);
      --cursor: rgba(255, 122, 168, 0.9);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
    }

    html {
      height: 100%;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--body-font);
      font-size: 15px;
      color: var(--text);
      background:
        radial-gradient(ellipse 120% 80% at 15% 8%, var(--bg-spot-a), transparent 50%),
        radial-gradient(ellipse 80% 60% at 88% 16%, var(--bg-spot-b), transparent 40%),
        radial-gradient(ellipse 60% 100% at 50% 100%, var(--bg-spot-c), transparent 60%),
        linear-gradient(178deg, var(--bg) 0%, var(--bg-accent) 100%);
      transition: background 300ms ease, color 300ms ease;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body[data-theme] {
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: var(--texture-opacity);
      background:
        repeating-linear-gradient(0deg, transparent, transparent 31px, var(--paper-line) 31px, var(--paper-line) 32px),
        linear-gradient(90deg, rgba(122, 98, 66, 0.12), transparent 5%, transparent 95%, rgba(122, 98, 66, 0.08));
      mix-blend-mode: multiply;
      z-index: 9999;
    }

    html[data-theme="crt"],
    body[data-theme="crt"] {
      background-color: var(--bg);
    }

    body[data-theme="crt"]::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background:
        repeating-linear-gradient(180deg, rgba(92, 255, 136, 0.025) 0px, rgba(92, 255, 136, 0.025) 1px, transparent 1px, transparent 3px),
        linear-gradient(rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.06) 50%, rgba(0,0,0,0.12) 100%);
      opacity: 0.7;
      animation: scanFlicker 8s infinite steps(12);
    }

    body[data-theme="crt"] .app::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 120px 40px rgba(0, 0, 0, 0.35);
      z-index: 10;
    }

    @keyframes scanFlicker {
      0%, 100% { opacity: 0.6; }
      15% { opacity: 0.72; }
      42% { opacity: 0.78; }
      55% { opacity: 0.52; }
      73% { opacity: 0.68; }
      88% { opacity: 0.75; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.88); opacity: 0.5; }
      50% { transform: scale(1); opacity: 1; }
    }

    @keyframes optionPulseRing {
      0% { transform: scale(0.8); opacity: 0.6; }
      50% { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(0.8); opacity: 0; }
    }

    @keyframes optionFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes optionSparkle {
      0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
      20% { opacity: 1; transform: scale(1) rotate(30deg); }
      80% { opacity: 0.6; transform: scale(0.8) rotate(150deg); }
    }

    @keyframes optionNudge {
      0%, 100% { transform: translateX(0) rotate(0); }
      20% { transform: translateX(-3px) rotate(-0.5deg); }
      40% { transform: translateX(3px) rotate(0.5deg); }
      60% { transform: translateX(-2px) rotate(-0.3deg); }
      80% { transform: translateX(2px) rotate(0.3deg); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes subtleBreathe {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 20px 4px var(--accent-glow); }
    }

    @keyframes optionItemIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse 120% 80% at 15% 8%, var(--bg-spot-a), transparent 50%),
        radial-gradient(ellipse 80% 60% at 88% 16%, var(--bg-spot-b), transparent 40%),
        radial-gradient(ellipse 60% 100% at 50% 100%, var(--bg-spot-c), transparent 60%),
        linear-gradient(178deg, var(--bg) 0%, var(--bg-accent) 100%);
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 88% 14%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 28%),
        linear-gradient(180deg,
          color-mix(in srgb, var(--panel-strong) 58%, transparent),
          color-mix(in srgb, var(--panel) 42%, transparent));
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      overflow: hidden;
    }

    .app::before { display: none; }

    .app > * {
      position: relative;
      z-index: 1;
    }

    .settings-fab {
      position: absolute;
      top: max(12px, env(safe-area-inset-top, 8px));
      right: max(12px, env(safe-area-inset-right, 8px));
      z-index: 12;
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid var(--glass-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.10), transparent 42%),
        var(--glass-bg);
      box-shadow: var(--glass-shadow), var(--glow);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      cursor: pointer;
      transition: transform 300ms ease, box-shadow 300ms ease, border-color 300ms ease, background 300ms ease;
      font: inherit;
      color: var(--muted);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-fab svg {
      width: 18px;
      height: 18px;
      transition: transform 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .settings-fab:hover {
      transform: scale(1.08);
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
      box-shadow: 0 8px 28px rgba(0,0,0,0.12), var(--glow);
    }

    .settings-fab:hover svg {
      transform: rotate(60deg);
    }

    .settings-fab:active {
      transform: scale(0.92);
      background: color-mix(in srgb, var(--accent) 10%, var(--panel-strong));
    }

    .settings-fab:active svg {
      transform: rotate(120deg);
    }

    .chip, button, input, textarea, select {
      font: inherit;
      color: inherit;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid var(--glass-edge);
      background: var(--glass-bg-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.13);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
      flex-shrink: 0;
    }

    .chip.loading .chip-dot {
      animation: pulse 1s infinite ease-in-out;
    }

    .theme-toggle {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
      gap: 4px;
      width: 100%;
      padding: 3px;
      border-radius: 16px;
      border: 1px solid var(--glass-edge);
      background: var(--glass-bg-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
    }

    .theme-option {
      min-width: 0;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.2;
      transition: background 200ms ease, color 200ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .theme-option.active {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.11), transparent 48%),
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 72%, white 18%), var(--accent-strong));
      color: var(--accent-text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 20px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    button {
      border: 1px solid var(--glass-edge);
      border-radius: 14px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.09), transparent 45%),
        var(--glass-bg);
      padding: 12px 16px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 22px rgba(0,0,0,0.08);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
      font-size: 14px;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover:not(:disabled) {
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary-btn {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.07), transparent 45%),
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 78%, white 14%), var(--accent-strong));
      color: var(--accent-text);
      border-color: color-mix(in srgb, var(--accent-strong) 70%, black 20%);
      font-weight: 700;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.12),
        0 12px 26px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .primary-btn:hover:not(:disabled) {
      border-color: color-mix(in srgb, var(--accent-strong) 80%, black 20%);
    }

    .ghost-btn {
      background: color-mix(in srgb, var(--glass-bg-soft) 70%, transparent);
    }

    .danger-btn {
      color: #ffd7d7;
      border-color: rgba(190, 49, 49, 0.32);
      background: rgba(141, 22, 22, 0.16);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      padding: 0;
      font-size: 18px;
      -webkit-tap-highlight-color: transparent;
    }
    .chat-panel {
      background: transparent;
    }

    .chat-panel {
      position: relative;
      overflow: hidden;
      flex: 1;
      min-height: 0;
      border: none;
    }

    .chat-panel::before,
    .chat-panel::after {
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 40px;
      pointer-events: none;
      z-index: 4;
    }

    .chat-panel::before {
      top: 0;
      background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    }

    .chat-panel::after {
      bottom: 0;
      background: linear-gradient(0deg, var(--bg) 0%, transparent 100%);
    }

    #log {
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: max(48px, env(safe-area-inset-top, 48px)) 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }

    #log::-webkit-scrollbar { display: none; }

    .empty-state {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 20px 16px;
    }

    .empty-card {
      max-width: 100%;
      padding: 32px 20px;
      border-radius: 28px;
      border: 1px solid var(--glass-edge);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.17), transparent 46%),
        var(--glass-bg-soft);
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      text-align: center;
      animation: fadeSlideUp 500ms ease both;
      position: relative;
      overflow: hidden;
    }

    .empty-card::before {
      content: none;
    }

    .empty-card > * { position: relative; }

    .empty-card h2 {
      margin: 0 0 12px;
      font: 900 clamp(26px, 7vw, 40px)/1.15 var(--header-font);
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .empty-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .empty-actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .scroll-sentinel {
      min-height: 1px;
      width: 100%;
      flex-shrink: 0;
    }

    .load-more-hint {
      align-self: center;
      color: var(--muted);
      font-size: 11px;
      opacity: 0.6;
      padding: 4px 0 8px;
      text-align: center;
    }

    .turn-divider {
      align-self: center;
      display: inline-flex;
      align-items: center;

    .loader {

    .loader span {

    .loader span:nth-child(2) { animation-delay: 0.13s; }

    .option-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 7;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      padding: 0 12px 12px;
      transition: opacity 220ms ease, visibility 0s linear 220ms;
    }

    .option-overlay.visible {
      visibility: visible;
      opacity: 1;
      transition-delay: 0s;
    }

    .option-overlay::before {
      content: "";
      position: absolute;
      left: 0; right: 0;
      bottom: 0; top: -100dvh;
      background:
        linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.10) 54%, rgba(0,0,0,0.34) 100%);
      opacity: 0;
      backdrop-filter: blur(1px);
      transition: opacity 260ms ease;
      pointer-events: none;
    }

    .option-overlay.open::before { opacity: 1; }

    .option-toggle {
      pointer-events: auto;
      position: absolute;
      right: 12px;
      bottom: 12px;
      border-radius: 999px;
      width: auto;
      height: 44px;
      padding: 0 18px 0 14px;

      -webkit-tap-highlight-color: transparent;

    .option-toggle::before {

      border-radius: 999px;

    }

    .option-subtitle {

      -webkit-overflow-scrolling: touch;
    }

    .option-chip {
      text-align: left;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--glass-edge) 72%, transparent);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.13), transparent 48%),

    .option-overlay.closing .option-chip {

    }

    textarea, input[type="text"], input[type="password"], select {

      backdrop-filter: blur(18px) saturate(1.35);

      transition: border-color 200ms ease, box-shadow 200ms ease, background 200ms ease;
    }

    select {

    .send-fab:active:not(:disabled) {

    }

      opacity: 0.7;

    }
    .range-row {

    }

    .modal-card {
      position: relative;
      width: 100%;
      max-height: 92dvh;
      overflow: auto;

    }

    .status-grid { display: grid; gap: 10px; }

<body data-theme="paper">
  <div class="app-shell">
    <button id="settingsBtn" class="settings-fab" type="button" aria-label="打开设置">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="app">
      <main class="chat-panel">
        <div id="log" aria-live="polite"></div>
        <div id="optionOverlay" class="option-overlay" aria-label="可选行动浮层">
          <button id="optionToggleBtn" class="option-toggle primary-btn" type="button" aria-label="展开选项">
            <span class="option-toggle-icon">▴</span><span class="option-toggle-label">选项</span>
          </button>
          <section class="option-panel">
            <div class="option-head">
              <div class="option-head-main">
                <div class="option-title">可选行动</div>
                <div class="option-subtitle">点按即可立刻发送，也可以继续自由输入。</div>
              </div>
              <button id="optionCollapseBtn" class="ghost-btn option-collapse-btn" type="button" aria-label="收起选项">

      <section class="composer">
        <div class="composer-field">
          <textarea id="playerInput" placeholder="输入你的行动..."></textarea>
        </div>
        <button id="sendBtn" class="send-fab primary-btn" type="button" aria-label="发送"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </section>

  <div id="settingsModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-head">
        <div>
          <h3 id="settingsTitle">设置</h3>
          <p class="modal-subtitle">模型、角色、主题和本地存档都收在这里。</p>
        </div>
        <button id="closeSettingsBtn" class="icon-btn" type="button" aria-label="关闭设置">×</button>
      </div>
      <div class="modal-body">
        <div class="settings-grid">
          <section class="section-card">
            <h4>当前会话</h4>
            <p>顶部状态信息和会话控制统一放在这里，主界面只保留聊天视图。</p>
            <div class="status-grid">
              <div class="status-row">
                <div id="gameStateChip" class="chip">
                  <span class="chip-dot"></span>
                  <span>未开始</span>
                </div>
                <div id="modelChip" class="chip">模型未校验</div>
              </div>
              <div id="storySummary" class="status-summary">在设置里填写 API Key 和模型，然后点击"开始新冒险"。</div>
              <div class="action-grid">
                <button id="startBtn" class="primary-btn" type="button">开始新冒险</button>

          <section class="section-card">
            <h4>模型接入</h4>
            <p>选择模型供应商，填入对应 API Key，并在开始前做一次快速校验。</p>
            <div class="form-grid">
              <label>
                <span>模型供应商</span>
                <select id="modelProvider">
                  <option value="siliconflow">硅基流动</option>
                  <option value="deepseek">DeepSeek</option>

                </select>
              </label>
              <label>
                <span id="apiKeyLabel">硅基流动 API Key</span>

              </label>

                <label>
                  <span>API 地址</span>

                </label>
                <label>
                  <span>模型名</span>
                  <input id="modelName" type="text" list="modelOptions" value="Qwen/Qwen2.5-7B-Instruct" />
                  <datalist id="modelOptions">
                    <option value="deepseek-v4-flash"></option>
                    <option value="deepseek-v4-pro"></option>
                    <option value="deepseek-chat"></option>
                    <option value="deepseek-reasoner"></option>
                    <option value="deepseek-ai/DeepSeek-V3.2"></option>
                    <option value="deepseek-ai/DeepSeek-R1"></option>
                    <option value="Qwen/Qwen3.5-122B-A10B"></option>
                    <option value="Qwen/Qwen3.5-35B-A3B"></option>
                    <option value="Qwen/Qwen2.5-7B-Instruct"></option>
                  </datalist>
                </label>
              </div>
              <div class="action-grid">
                <button id="validateBtn" type="button">校验模型连接</button>
                <div id="validateStatus" class="chip">尚未校验</div>

          <section class="section-card">
            <h4>界面与存档</h4>
            <p>主题会自动保存到本地，存档也保留在浏览器中。</p>
	            <div class="form-grid">
	              <div class="theme-toggle" aria-label="设置主题">
	                <button class="theme-option active" type="button" data-theme-option="paper">白昼纸页</button>
	                <button class="theme-option" type="button" data-theme-option="crt">夜间 CRT</button>
	                <button class="theme-option" type="button" data-theme-option="ink">墨夜</button>
	                <button class="theme-option" type="button" data-theme-option="blueprint">蓝图</button>
	                <button class="theme-option" type="button" data-theme-option="cherry">樱桃</button>
	              </div>
              <label>
                <span>文本输出速度</span>
                <div class="range-row">
                  <input id="textSpeed" type="range" min="10" max="80" step="2" value="28" />
                  <div id="textSpeedValue" class="range-value">28 字/秒</div>
                </div>
              </label>
              <div class="action-grid">
                <button id="saveBtn" type="button">手动存档</button>
                <button id="loadBtn" type="button">读取存档</button>
                <button id="exportBtn" type="button">导出记录</button>
                <button id="clearBtn" class="danger-btn" type="button">清空记录</button>
              </div>
              <div class="security-note">
                纯前端页面会把 API Key 和存档写入当前浏览器的 localStorage。若要更安全，应该改成你自己的后端代理。
              </div>
            </div>

        <div class="security-note">修改会自动保存到本地。</div>
        <button id="closeSettingsFootBtn" class="primary-btn" type="button">完成</button>
      </div>
    </section>
  </div>
  <script>
    const STORAGE_KEY = "siliconflow_text_adventure_v2";
    const MODEL_PROVIDERS = {
      siliconflow: {
        label: "硅基流动",
        apiKeyLabel: "硅基流动 API Key",
        apiBase: "https://api.siliconflow.cn/v1/chat/completions",
        modelName: "Qwen/Qwen2.5-7B-Instruct"
      },
      deepseek: {
        label: "DeepSeek",
        apiKeyLabel: "DeepSeek API Key",
        apiBase: "https://api.deepseek.com/chat/completions",
        modelName: "deepseek-v4-flash"
      },
      custom: {
        label: "自定义",
        apiKeyLabel: "API Key",
        apiBase: "",
        modelName: ""
      }
    };
    const DEFAULT_PROVIDER = "siliconflow";
    const DEFAULT_API_BASE = MODEL_PROVIDERS[DEFAULT_PROVIDER].apiBase;
    const DEFAULT_MODEL = MODEL_PROVIDERS[DEFAULT_PROVIDER].modelName;
    const THEMES = ["paper", "crt", "ink", "blueprint", "cherry"];
    const DEFAULT_TEXT_SPEED = 28;
    const OPTION_PANEL_CLOSE_MS = 220;
    const MAX_WORLDBUILD_ROUNDS = 10;
    const CONTEXT_WINDOW_SIZE = 10;
    const DOM_NODE_CAP = 60;
    const DOM_RENDER_TAIL = 40;
    const SETUP_TOPIC_LABELS = {
      story_type: "故事类型",
      world_concept: "世界概念",
      world_tone: "世界基调",
      core_conflict: "核心冲突",
      player_name: "玩家名字",
      player_identity: "玩家身份",
      player_trait: "玩家性格倾向",
      player_hook: "玩家切入点"
    };

    const els = {
      body: document.body,
      log: document.getElementById("log"),
      status: document.getElementById("status"),
      optionOverlay: document.getElementById("optionOverlay"),
      optionStrip: document.getElementById("optionStrip"),
      optionToggleBtn: document.getElementById("optionToggleBtn"),
      optionCollapseBtn: document.getElementById("optionCollapseBtn"),
      optionTitle: document.querySelector(".option-title"),
      optionSubtitle: document.querySelector(".option-subtitle"),
      playerInput: document.getElementById("playerInput"),
      sendBtn: document.getElementById("sendBtn"),
      startBtn: document.getElementById("startBtn"),
      retryBtn: document.getElementById("retryBtn"),
      settingsBtn: document.getElementById("settingsBtn"),
      settingsModal: document.getElementById("settingsModal"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      closeSettingsBtn: document.getElementById("closeSettingsBtn"),
      closeSettingsFootBtn: document.getElementById("closeSettingsFootBtn"),
      modelProvider: document.getElementById("modelProvider"),
      apiKeyLabel: document.getElementById("apiKeyLabel"),
      apiKey: document.getElementById("apiKey"),
      apiBase: document.getElementById("apiBase"),
      modelName: document.getElementById("modelName"),
      validateBtn: document.getElementById("validateBtn"),
      validateStatus: document.getElementById("validateStatus"),
      saveBtn: document.getElementById("saveBtn"),
      loadBtn: document.getElementById("loadBtn"),
      exportBtn: document.getElementById("exportBtn"),
      clearBtn: document.getElementById("clearBtn"),
      gameStateChip: document.getElementById("gameStateChip"),
      modelChip: document.getElementById("modelChip"),
      storySummary: document.getElementById("storySummary"),
      themeOptions: document.querySelectorAll("[data-theme-option]"),
      textSpeed: document.getElementById("textSpeed"),
      textSpeedValue: document.getElementById("textSpeedValue")
    };

    const state = {
      started: false,
      busy: false,
      phase: "idle",
      sessionStage: "idle",
      theme: "paper",
      messages: [],
      lastUserInput: "",
      currentTurnTimestamp: null,
      setupState: null,
      worldbook: null,
      validation: { ok: false, checkedAt: "", detail: "模型未校验" },
      optionPanelOpen: false,
      contextSummary: "",
      lastSummarizedIndex: 0
    };

    function escapeHtml(text) {
      return text.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    }
    function setStatus(text, isError = false) {
      els.status.textContent = text;
      els.status.style.color = isError ? "#f07d7d" : "";
    }
    function updateGameStateChip(text, loading = false) {
      els.gameStateChip.classList.toggle("loading", loading);
      els.gameStateChip.innerHTML = `<span class="chip-dot"></span><span>${escapeHtml(text)}</span>`;
    }
    function updateModelStatus() {
      const label = state.validation.ok
        ? `模型已校验${state.validation.checkedAt ? " · " + state.validation.checkedAt : ""}`
        : state.validation.detail || "模型未校验";
      els.modelChip.textContent = label;
      els.validateStatus.textContent = label;
    }
    function getAssistantLabel(stage = state.sessionStage) { return "造世者"; }
    function getSessionLabel() {
      if (!state.started || state.sessionStage === "idle") return "未开始";
      if (state.sessionStage === "setup") return "创建世界中";
      if (state.sessionStage === "bootstrap") return "编织世界中";
      return "进行中";
    }
    function getSetupRoundCount() {
      return state.messages.filter(msg => msg.stage === "setup" && msg.role === "user" && !msg.hidden).length;
    }
    function updateSummary() {
      if (!state.started) {
        els.storySummary.textContent = "在设置里填写 API Key 和模型，然后开始新冒险。世界、人设与主线都将在开局对话中共同创建。";
        return;
      }
      if (state.sessionStage === "setup") {
        const topic = SETUP_TOPIC_LABELS[state.setupState?.currentQuestionKey] || "故事类型";
        const storyType = state.setupState?.answers?.storyType || "尚未确定";
        const roundsUsed = getSetupRoundCount();
        const roundsLeft = Math.max(0, MAX_WORLDBUILD_ROUNDS - roundsUsed);
        els.storySummary.textContent = `正在与造世者共同搭建世界。已确认的故事类型：${storyType}。当前问题：${topic}。最多 ${MAX_WORLDBUILD_ROUNDS} 轮问答，剩余 ${roundsLeft} 轮。`;
        return;
      }
      if (state.sessionStage === "bootstrap") {
        const storyType = state.setupState?.answers?.storyType || "未命名类型";
        const worldTitle = state.worldbook?.worldTitle || "未命名世界";
        els.storySummary.textContent = `造世者正在根据"${storyType}"的设定编织 ${worldTitle} 的规则、角色档案与主线节点。`;
        return;
      }
      const title = state.worldbook?.worldTitle || "未命名世界";
      const currentNode = state.worldbook?.mainPlot?.nodes?.find(node => node.id === state.worldbook?.mainPlot?.currentNodeId)?.title;
      const playerName = state.worldbook?.playerState?.name || "玩家";
      els.storySummary.textContent = `${playerName} 正在 ${title} 中冒险。当前主线节点：${currentNode || "序章"}`;
    }
    function updateThemeButtons() {
      els.themeOptions.forEach(button => {
        button.classList.toggle("active", button.dataset.themeOption === state.theme);
      });
    }
    function applyTheme(theme, persist = true) {
      state.theme = THEMES.includes(theme) ? theme : "paper";
      document.documentElement.setAttribute("data-theme", state.theme);
      els.body.setAttribute("data-theme", state.theme);
      updateThemeButtons();
      redrawLogFromState();
      if (persist) saveState(true);
    }
    function updateTextSpeedLabel() {
      const value = Number.parseInt(els.textSpeed.value, 10) || DEFAULT_TEXT_SPEED;
      els.textSpeedValue.textContent = `${value} 字/秒`;
    }
    function getProviderPreset(provider = els.modelProvider.value) {
      return MODEL_PROVIDERS[provider] || MODEL_PROVIDERS[DEFAULT_PROVIDER];
    }
    function inferProviderFromConfig(apiBase = "", modelName = "") {
      const normalizedBase = apiBase.trim();
      if (normalizedBase.includes("api.deepseek.com") || modelName.trim().startsWith("deepseek-")) return "deepseek";
      if (normalizedBase.includes("api.siliconflow.cn")) return "siliconflow";
      return "custom";
    }
    function applyProviderPreset(provider, options = {}) {
      const preset = getProviderPreset(provider);
      const previousPreset = getProviderPreset(els.modelProvider.value);
      const shouldFill = options.force || !els.apiBase.value.trim() || els.apiBase.value.trim() === previousPreset.apiBase;
      els.modelProvider.value = MODEL_PROVIDERS[provider] ? provider : DEFAULT_PROVIDER;
      els.apiKeyLabel.textContent = preset.apiKeyLabel;
      if (shouldFill && preset.apiBase) els.apiBase.value = preset.apiBase;
      if ((options.force || !els.modelName.value.trim() || els.modelName.value.trim() === previousPreset.modelName) && preset.modelName) {
        els.modelName.value = preset.modelName;
      }
      if (provider !== "custom") state.validation = { ok:false, checkedAt:"", detail:"模型未校验" };
      updateModelStatus();
    }
    function setBusy(flag, phase = "idle") {
      state.busy = flag;
      state.phase = phase;
      els.sendBtn.disabled = flag;
      els.startBtn.disabled = flag;
      els.retryBtn.disabled = flag;
      els.validateBtn.disabled = flag;
      if (!flag) { updateGameStateChip(getSessionLabel()); return; }
      if (phase === "thinking") {
        if (state.sessionStage === "setup") updateGameStateChip("世界设定问答中", true);
        else if (state.sessionStage === "bootstrap") updateGameStateChip("造世者编织世界中", true);
        else updateGameStateChip("模型思考中", true);
      } else if (phase === "streaming") {
        updateGameStateChip("剧情输出中", true);
      }
    }
    function getConfig() {
      const provider = MODEL_PROVIDERS[els.modelProvider.value] ? els.modelProvider.value : inferProviderFromConfig(els.apiBase.value, els.modelName.value);
      return {
        provider,
        apiKey: els.apiKey.value.trim(),
        apiBase: els.apiBase.value.trim() || getProviderPreset(provider).apiBase || DEFAULT_API_BASE,
        modelName: els.modelName.value.trim() || getProviderPreset(provider).modelName || DEFAULT_MODEL,
        textSpeed: Number.parseInt(els.textSpeed.value, 10) || DEFAULT_TEXT_SPEED
      };
    }
    function createInitialSetupState() {
      return {
        status: "questioning", currentQuestionKey: "story_type", nextQuestionKey: "world_concept",
        completedTopics: [], askedTopics: [],
        answers: { storyType:"", worldConcept:"", worldTone:"", coreConflict:"", playerName:"", playerIdentity:"", playerTrait:"", playerHook:"" }
      };
    }
    function normalizeSetupState(raw) {
      const base = createInitialSetupState();
      const next = raw && typeof raw === "object" ? raw : {};
      const answers = next.answers && typeof next.answers === "object" ? next.answers : {};
      return {
        ...base, ...next,
        completedTopics: Array.isArray(next.completedTopics) ? next.completedTopics : base.completedTopics,
        askedTopics: Array.isArray(next.askedTopics) ? next.askedTopics : base.askedTopics,
        answers: { ...base.answers, ...answers }
      };
    }
    function createInitialWorldbook(cfg) {
      return {
        status:"draft", worldTitle:"", coreConcept:"", rules:[],
        gmAgent:{ identity:"造世者", responsibilities:["维护世界规则","维护主线节点","维护角色一致性"], trackedCharacters:[], trackedPlotNodes:[], currentFocus:"", sceneIntent:"", notes:[] },
        mainPlot:{ opening:"", ending:"", currentNodeId:"node-1", nodes:[] },
        npcs:[],
        playerState:{ name:"", identity:"", status:{ physical:"正常", mental:"稳定", location:"" }, personality:[], relationships:{}, emotion:"", inventory:[], clues:[], flags:[], notes:[] },
        worldState:{ time:"", threatLevel:"", globalFlags:[], impactLog:[] }
      };
    }
    function normalizeWorldbook(raw, cfg = getConfig()) {
      const base = createInitialWorldbook(cfg);
      const next = raw && typeof raw === "object" ? raw : {};
      const gmAgent = next.gmAgent && typeof next.gmAgent === "object" ? next.gmAgent : {};
      const mainPlot = next.mainPlot && typeof next.mainPlot === "object" ? next.mainPlot : {};
      const playerState = next.playerState && typeof next.playerState === "object" ? next.playerState : {};
      const worldState = next.worldState && typeof next.worldState === "object" ? next.worldState : {};
      const playerStatus = playerState.status && typeof playerState.status === "object" ? playerState.status : {};
      return {
        ...base, ...next,
        rules: Array.isArray(next.rules) ? next.rules : base.rules,
        gmAgent: { ...base.gmAgent, ...gmAgent,
          responsibilities: Array.isArray(gmAgent.responsibilities) ? gmAgent.responsibilities : base.gmAgent.responsibilities,
          trackedCharacters: Array.isArray(gmAgent.trackedCharacters) ? gmAgent.trackedCharacters : base.gmAgent.trackedCharacters,
          trackedPlotNodes: Array.isArray(gmAgent.trackedPlotNodes) ? gmAgent.trackedPlotNodes : base.gmAgent.trackedPlotNodes,
          notes: Array.isArray(gmAgent.notes) ? gmAgent.notes : base.gmAgent.notes },
        mainPlot: { ...base.mainPlot, ...mainPlot,
          nodes: Array.isArray(mainPlot.nodes) ? mainPlot.nodes : base.mainPlot.nodes },
        npcs: Array.isArray(next.npcs) ? next.npcs : base.npcs,
        playerState: { ...base.playerState, ...playerState,
          status: { ...base.playerState.status, ...playerStatus },
          personality: Array.isArray(playerState.personality) ? playerState.personality : base.playerState.personality,
          relationships: playerState.relationships && typeof playerState.relationships === "object" ? playerState.relationships : base.playerState.relationships,
          inventory: Array.isArray(playerState.inventory) ? playerState.inventory : base.playerState.inventory,
          clues: Array.isArray(playerState.clues) ? playerState.clues : base.playerState.clues,
          flags: Array.isArray(playerState.flags) ? playerState.flags : base.playerState.flags,
          notes: Array.isArray(playerState.notes) ? playerState.notes : base.playerState.notes },
        worldState: { ...base.worldState, ...worldState,
          globalFlags: Array.isArray(worldState.globalFlags) ? worldState.globalFlags : base.worldState.globalFlags,
          impactLog: Array.isArray(worldState.impactLog) ? worldState.impactLog : base.worldState.impactLog }
      };
    }

    function buildSetupSystemPrompt(cfg) {
      const roundsUsed = getSetupRoundCount();
      const roundsLeft = Math.max(0, MAX_WORLDBUILD_ROUNDS - roundsUsed);
      const setupState = normalizeSetupState(state.setupState);
      return [
        "你是造世者，现在处于世界观创建阶段。","",
        "你的职责：",
        "- 只和玩家共同确定两类内容：世界观，和玩家自身角色。",
        "- 关键 NPC、剧情走向、主线节点、结局方向，全部由你在后续后台自行构建，不允许向玩家征求意见。",
        "- 当前阶段严格遵循“先宏观，后微观”：先故事类型，再世界概念、世界基调、核心冲突，最后才是玩家名字、身份、性格倾向、进入世界的切入点。",
        "- 第一轮必须先问“这是什么类型的故事”。",
        "- 每一轮只能问 1 个问题，不能同时问两个独立问题。",
        "- 非收束轮必须给出 2-3 个编号选项，同时允许玩家自由输入。",
        `- 最多只能进行 ${MAX_WORLDBUILD_ROUNDS} 轮问答。当前已用 ${roundsUsed} 轮，剩余 ${roundsLeft} 轮。`,
        "- 如果当前信息已经足够，或者只剩最后一轮，你必须收束设定，不再继续提问。","",
        "你的回复要求：",
        "- 可见正文只能使用结构化标签：<narration>...</narration> 与 <dialogue><speaker>...</speaker><content>...</content></dialogue>。",

    function saveState(silent = false) {
      const payload = {
        config: getConfig(), started: state.started, sessionStage: state.sessionStage,
        theme: state.theme, messages: state.messages, lastUserInput: state.lastUserInput,
        currentTurnTimestamp: state.currentTurnTimestamp, setupState: state.setupState,
        worldbook: state.worldbook, validation: state.validation, optionPanelOpen: state.optionPanelOpen,
        contextSummary: state.contextSummary, lastSummarizedIndex: state.lastSummarizedIndex

      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      if (!silent) setStatus("已保存到本地");
    }
    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        applyTheme("paper", false); redrawLogFromState(); updateSummary(); updateModelStatus();
        setStatus("未找到存档"); return;
      }
      try {
        const parsed = JSON.parse(raw);
        if (parsed.config) {
          const provider = parsed.config.provider || inferProviderFromConfig(parsed.config.apiBase || "", parsed.config.modelName || "");
          els.modelProvider.value = MODEL_PROVIDERS[provider] ? provider : "custom";
          els.apiKey.value = parsed.config.apiKey || "";
          els.apiBase.value = parsed.config.apiBase || DEFAULT_API_BASE;
          els.modelName.value = parsed.config.modelName || DEFAULT_MODEL;
          els.textSpeed.value = String(parsed.config.textSpeed || DEFAULT_TEXT_SPEED);
          applyProviderPreset(els.modelProvider.value, { force:false });
        }
        state.started = Boolean(parsed.started);
        state.sessionStage = parsed.sessionStage === "worldbuild" ? "setup"
          : parsed.sessionStage === "adventure" ? "play"
          : parsed.sessionStage || (parsed.started ? "play" : "idle");
        state.setupState = normalizeSetupState(parsed.setupState);
        state.worldbook = parsed.worldbook ? normalizeWorldbook(parsed.worldbook) : null;
        state.messages = normalizeMessages(Array.isArray(parsed.messages) ? parsed.messages : []);
        state.lastUserInput = parsed.lastUserInput || "";
        state.currentTurnTimestamp = parsed.currentTurnTimestamp || null;
        state.validation = parsed.validation || state.validation;
        state.optionPanelOpen = Boolean(parsed.optionPanelOpen);
        state.contextSummary = parsed.contextSummary || "";
        state.lastSummarizedIndex = parsed.lastSummarizedIndex || 0;
        applyTheme(parsed.theme || "paper", false);
        updateTextSpeedLabel(); redrawLogFromState(); updateSummary();
        updateModelStatus(); updateGameStateChip(getSessionLabel());
        setStatus("已读取本地存档");
      } catch (err) {
        applyTheme("paper", false); els.textSpeed.value = String(DEFAULT_TEXT_SPEED);
        updateTextSpeedLabel(); state.sessionStage = "idle";
        state.setupState = null; state.worldbook = null;
        redrawLogFromState(); updateSummary(); updateModelStatus();
        setStatus("存档解析失败：" + err.message, true);
      }
    }

    function createTurnDivider(turnTimestamp) {

    function ensureTurnDivider(turnTimestamp) {

      createTurnDivider(turnTimestamp);

    function normalizeMessages(messages) {
      let lastTurnTimestamp = null;
      return messages.map((msg, index) => {
        const next = { ...msg };
        if (next.stage === "worldbuild") next.stage = "setup";
        if (next.stage === "adventure") next.stage = "play";
        if (!next.stage) next.stage = state.sessionStage === "setup" ? "setup" : "play";
        if (next.role === "assistant" && !next.assistantLabel) next.assistantLabel = getAssistantLabel(next.stage);
        if (next.turnTimestamp) { lastTurnTimestamp = next.turnTimestamp; return next; }
        if (next.role === "user") { lastTurnTimestamp = Date.now() + index; next.turnTimestamp = lastTurnTimestamp; return next; }
        if (lastTurnTimestamp) { next.turnTimestamp = lastTurnTimestamp; return next; }
        next.turnTimestamp = Date.now() + index; lastTurnTimestamp = next.turnTimestamp; return next;
      });
    }
    function setOptionPanelOpen(flag) {

    function extractTagPayload(text, tagName) {
      const match = text.match(new RegExp(`<${tagName}>([\\s\\S]*?)<\\/${tagName}>`, "i"));
      return match ? match[1].trim() : "";
    }
    function stripHiddenPayloadTags(text) {
      return text.replace(/<setup_state>[\s\S]*?<\/setup_state>/gi,"").replace(/<worldbook>[\s\S]*?<\/worldbook>/gi,"").replace(/<state_update>[\s\S]*?<\/state_update>/gi,"").trim();
    }
    function safeParseJson(text) {
      if (!text) return null;
      try { return JSON.parse(text); } catch(_) { return null; }
    }
    function applySetupStateFromText(text) {
      const payload = extractTagPayload(text, "setup_state");
      const parsed = safeParseJson(payload);
      if (!parsed) return false;
      const prev = normalizeSetupState(state.setupState);
      const next = normalizeSetupState(parsed);
      /* Merge: never lose previously tracked topics */
      const mergedCompleted = [...new Set([...prev.completedTopics, ...next.completedTopics])];
      const mergedAsked = [...new Set([...prev.askedTopics, ...next.askedTopics,
        ...(next.currentQuestionKey ? [next.currentQuestionKey] : [])])];
      next.completedTopics = mergedCompleted;
      next.askedTopics = mergedAsked;
      /* Preserve previous answers that might be missing from new parse */
      for (const [k, v] of Object.entries(prev.answers)) {
        if (v && !next.answers[k]) next.answers[k] = v;
      }
      state.setupState = next;
      updateSummary(); return true;
    }
    function applyWorldbookDraftFromText(text) {
      const payload = extractTagPayload(text, "worldbook");
      const fallback = text.replace(/```(?:json|xml|html|text)?/gi,"").replace(/```/g,"").trim();
      const parsed = safeParseJson(payload) || safeParseJson(fallback);
      if (!parsed) return false;
      state.worldbook = normalizeWorldbook(parsed);
      updateSummary(); return true;
    }
    function mergeNpcUpdate(existing, update) {
      const baseStatus = existing?.status && typeof existing.status === "object" ? existing.status : {};
      const nextStatus = update?.status && typeof update.status === "object" ? update.status : {};
      return {
        ...(existing||{}), ...(update||{}),
        identity: update?.identity ?? existing?.identity ?? "",
        emotion: update?.emotion ?? existing?.emotion ?? "",
        personality: Array.isArray(update?.personality) ? update.personality : Array.isArray(existing?.personality) ? existing.personality : [],
        relationships: update?.relationships && typeof update.relationships === "object" ? update.relationships : existing?.relationships && typeof existing.relationships === "object" ? existing.relationships : {},
        status: { ...baseStatus, ...nextStatus, notes: Array.isArray(nextStatus.notes) ? nextStatus.notes : Array.isArray(baseStatus.notes) ? baseStatus.notes : [] }
      };
    }
    function applyStateUpdateFromText(text) {
      const payload = extractTagPayload(text, "state_update");
      const parsed = safeParseJson(payload);
      if (!parsed || !state.worldbook) return false;
      const worldbook = normalizeWorldbook(state.worldbook);
      if (parsed.playerState && typeof parsed.playerState === "object") {
        const nextStatus = parsed.playerState.status && typeof parsed.playerState.status === "object" ? parsed.playerState.status : {};
        worldbook.playerState = { ...worldbook.playerState, ...parsed.playerState,
          status: { ...worldbook.playerState.status, ...nextStatus },
          personality: Array.isArray(parsed.playerState.personality) ? parsed.playerState.personality : worldbook.playerState.personality,
          relationships: parsed.playerState.relationships && typeof parsed.playerState.relationships === "object" ? parsed.playerState.relationships : worldbook.playerState.relationships,
          inventory: Array.isArray(parsed.playerState.inventory) ? parsed.playerState.inventory : worldbook.playerState.inventory,
          clues: Array.isArray(parsed.playerState.clues) ? parsed.playerState.clues : worldbook.playerState.clues,
          flags: Array.isArray(parsed.playerState.flags) ? parsed.playerState.flags : worldbook.playerState.flags,
          notes: Array.isArray(parsed.playerState.notes) ? parsed.playerState.notes : worldbook.playerState.notes };
      }
      if (parsed.worldState && typeof parsed.worldState === "object") {
        worldbook.worldState = { ...worldbook.worldState, ...parsed.worldState,
          globalFlags: Array.isArray(parsed.worldState.globalFlags) ? parsed.worldState.globalFlags : worldbook.worldState.globalFlags,
          impactLog: Array.isArray(parsed.worldState.impactLog) ? parsed.worldState.impactLog : worldbook.worldState.impactLog };
      }
      if (Array.isArray(parsed.npcUpdates) && parsed.npcUpdates.length) {
        const nextNpcs = [...worldbook.npcs];
        for (const update of parsed.npcUpdates) {
          if (!update || typeof update !== "object") continue;
          const index = nextNpcs.findIndex(npc => (update.id && npc.id === update.id) || (update.name && npc.name === update.name));
          if (index >= 0) nextNpcs[index] = mergeNpcUpdate(nextNpcs[index], update);
          else nextNpcs.push(mergeNpcUpdate(null, update));
        }
        worldbook.npcs = nextNpcs;
      }
      if (parsed.plot && typeof parsed.plot === "object") {
        worldbook.mainPlot = { ...worldbook.mainPlot, ...parsed.plot, nodes: [...worldbook.mainPlot.nodes] };
        if (parsed.plot.currentNodeId) worldbook.mainPlot.currentNodeId = parsed.plot.currentNodeId;
        if (Array.isArray(parsed.plot.nodeStatusUpdates)) {
          worldbook.mainPlot.nodes = worldbook.mainPlot.nodes.map(node => {
            const update = parsed.plot.nodeStatusUpdates.find(item => item && item.id === node.id);
            return update ? { ...node, ...update } : node;
          });
        }
      }
      if (parsed.agentState && typeof parsed.agentState === "object") {
        worldbook.gmAgent = { ...worldbook.gmAgent, ...parsed.agentState,
          responsibilities: Array.isArray(parsed.agentState.responsibilities) ? parsed.agentState.responsibilities : worldbook.gmAgent.responsibilities,
          trackedCharacters: Array.isArray(parsed.agentState.trackedCharacters) ? parsed.agentState.trackedCharacters : worldbook.gmAgent.trackedCharacters,
          trackedPlotNodes: Array.isArray(parsed.agentState.trackedPlotNodes) ? parsed.agentState.trackedPlotNodes : worldbook.gmAgent.trackedPlotNodes,
          notes: Array.isArray(parsed.agentState.notes) ? parsed.agentState.notes : worldbook.gmAgent.notes };
      }
      if (Array.isArray(parsed.canonNotes) && parsed.canonNotes.length) {
        worldbook.worldState.impactLog = [...worldbook.worldState.impactLog, ...parsed.canonNotes];
      }
      state.worldbook = normalizeWorldbook(worldbook);
      updateSummary(); return true;
    }

    async function summarizePrunedMessages(messagesToSummarize) {
      const existing = state.contextSummary ? `已有回顾：\n${state.contextSummary}\n\n新增内容：\n` : "";
      const transcript = messagesToSummarize.map(msg => {
        const role = msg.role === "assistant" ? "造世者" : "玩家";
        return `[${role}] ${stripHiddenPayloadTags(msg.content).slice(0, 300)}`;
      }).join("\n");
      try {
        const result = await requestChatOnce([
          { role: "system", content: "你是一个剧情压缩 Agent。将以下对话历史压缩为一段简洁的剧情回顾（300字以内）。\n保留：关键剧情转折、玩家做出的重要选择、角色状态变化、获得的线索和物品。\n丢弃：重复描写、选项列表、过渡性旁白。\n只输出压缩后的回顾文本，不要附带标签或说明。" },
          { role: "user", content: existing + transcript }
        ], { temperature: 0.3, maxTokens: 500 });
        if (result.text) {
          state.contextSummary = result.text.trim();
          saveState(true);
        }
      } catch (_) { /* summarization failure is non-fatal */ }
    }

    function buildRequestMessages(stage = state.sessionStage) {

    async function streamChat(messages, options = {}) {

    async function classifyVisibleAssistantOutput(text, stage = state.sessionStage) {

    async function consumeSseStream(reader, handlers) {

          let json; try { json = JSON.parse(data); } catch(_) { continue; }
          const delta = json?.choices?.[0]?.delta?.content || ""; if (delta) handlers.onDelta(delta);
          if (json?.usage) usageText = `tokens: prompt ${json.usage.prompt_tokens??"-"}, completion ${json.usage.completion_tokens??"-"}`;
        }
      }
      if (buffer.trim().startsWith("data:")) {
        const data = buffer.trim().slice(5).trim();
        if (data && data !== "[DONE]") { try { const json = JSON.parse(data); const delta = json?.choices?.[0]?.delta?.content||""; if (delta) handlers.onDelta(delta); if (json?.usage) usageText = `tokens: prompt ${json.usage.prompt_tokens??"-"}, completion ${json.usage.completion_tokens??"-"}`; } catch(_){} }

    async function typewriterTextToElement(finalText, placeholderEl) {

      const tickDelay = Math.max(16, Math.round((charsPerTick / charsPerSecond) * 1000));
      setBusy(true, "streaming"); setStatus("剧情输出中…"); placeholderEl.remove();

    function isSetupReady() { return state.setupState?.status === "ready"; }

    async function requestVisibleAssistantReply(stage = state.sessionStage) {

    async function runBootstrapPhase() {
