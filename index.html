    function createThinkingMessage() {
      const div = document.createElement("article");
      div.className = "msg assistant no-label";
      div.dataset.role = getAssistantLabel();
      div.innerHTML = `
        <div class="thinking-wrap">
          <div class="loader"><span></span><span></span><span></span></div>
          <span>${state.sessionStage === "worldbuild" ? "世界观生成 Agent 正在整理设定…" : "模型正在思考剧情走向…"}</span>
        </div>
      `;
      els.log.appendChild(div);
      els.log.scrollTop = els.log.scrollHeight;
      return div;
    }

    async function streamChat(messages, options = {}) {
      const cfg = getConfig();
      if (!cfg.apiKey) throw new Error("请先在设置里输入 API Key");
      if (!cfg.apiBase) throw new Error("API 地址不能为空");
      if (!cfg.modelName) throw new Error("模型名不能为空");

      const response = await fetch(cfg.apiBase, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${cfg.apiKey}`
        },
        body: JSON.stringify({
          model: cfg.modelName,
          messages,
          temperature: options.temperature ?? 0.85,
          top_p: options.topP ?? 0.95,
          max_tokens: options.maxTokens ?? 700,
          stream: true
        })
      });

      if (!response.ok) {
        let details = "";
        try {
          details = await response.text();
        } catch (_) {}
        throw new Error(`请求失败 (${response.status})${details ? " | " + details.slice(0, 300) : ""}`);
      }

      if (!response.body) {
        throw new Error("浏览器不支持流式响应");
      }

      return response.body.getReader();
    }

    async function consumeSseStream(reader, handlers) {
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let usageText = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split("\n");
        buffer = parts.pop() || "";

        for (const rawLine of parts) {
          const line = rawLine.trim();
          if (!line || !line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (data === "[DONE]") continue;
          let json;
          try {
            json = JSON.parse(data);
          } catch (_) {
            continue;
          }
          const delta = json?.choices?.[0]?.delta?.content || "";
          if (delta) handlers.onDelta(delta);
          if (json?.usage) {
            usageText = `tokens: prompt ${json.usage.prompt_tokens ?? "-"}, completion ${json.usage.completion_tokens ?? "-"}`;
          }
        }
      }

      if (buffer.trim().startsWith("data:")) {
        const data = buffer.trim().slice(5).trim();
        if (data && data !== "[DONE]") {
          try {
            const json = JSON.parse(data);
            const delta = json?.choices?.[0]?.delta?.content || "";
            if (delta) handlers.onDelta(delta);
            if (json?.usage) {
              usageText = `tokens: prompt ${json.usage.prompt_tokens ?? "-"}, completion ${json.usage.completion_tokens ?? "-"}`;
            }
          } catch (_) {}
        }
      }

      return usageText;
    }

    async function typewriterStreamToElement(reader, placeholderEl) {
      let finalText = "";
      let usageText = "";

      usageText = await consumeSseStream(reader, {
        onDelta(delta) {
          finalText += delta;
        }
      });

      if (!finalText.trim()) {
        throw new Error("模型返回为空");
      }

      const segments = splitAssistantIntoSegments(finalText);
      const charsPerSecond = Math.max(10, Number.parseInt(getConfig().textSpeed, 10) || DEFAULT_TEXT_SPEED);
      const charsPerTick = Math.max(1, Math.round(charsPerSecond / 24));
      const tickDelay = Math.max(16, Math.round((charsPerTick / charsPerSecond) * 1000));

      setBusy(true, "streaming");
      setStatus("剧情输出中…");
      placeholderEl.remove();

      for (const segment of segments) {
        const el = segment.type === "speech"
          ? createMessageElement(segment.role || "npc", "", {
              speech: true,
              label: segment.speaker,
              raw: true
            })
          : createMessageElement("assistant", "", {
              raw: true,
              label: getAssistantLabel(),
              hideLabel: true
            });

        const characters = [...(segment.content || "")];
        el.classList.add("streaming");

        let shown = 0;
        while (shown < characters.length) {
          shown += charsPerTick;
          el.textContent = characters.slice(0, shown).join("");
          els.log.scrollTop = els.log.scrollHeight;
          await new Promise(resolve => setTimeout(resolve, tickDelay));
        }

        el.classList.remove("streaming");
        el.textContent = segment.content || "";
      }

      return { text: finalText.trim(), usageText };
    }

    function isWorldbookReady() {
      return state.worldbook?.status === "ready";
    }

    function hasReachedWorldbuildLimit() {
      return getWorldbuildRoundCount() >= MAX_WORLDBUILD_ROUNDS;
    }

    function isWorldbuildConfirmInput(text) {
      return /(确认.*(?:世界|设定)|开始冒险|进入冒险|开始游戏|进入游戏|就这样开始|锁定设定)/.test(text);
    }

    async function beginAdventureFromWorldbook(autoStart = false) {
      const cfg = getConfig();
      if (!isWorldbookReady() && !hasReachedWorldbuildLimit()) {
        setStatus("世界设定还没有完成", true);
        return;
      }
      if (state.worldbook && !isWorldbookReady()) {
        state.worldbook = normalizeWorldbook({
          ...state.worldbook,
          status: "ready"
        }, cfg);
      }
      state.sessionStage = "adventure";
      state.currentTurnTimestamp = Date.now();
      state.messages.push({
        role: "user",
        hidden: true,
        stage: "adventure",
        turnTimestamp: state.currentTurnTimestamp,
        content: `${autoStart ? "世界设定已完成。" : "世界设定已确认。"}请严格根据既定世界档案开始正式剧情，从主线 opening 与 currentNodeId 对应的节点开场，保持人物状态、世界规则、主线节点一致，并给出 3-5 个可选行动。`
      });
      updateSummary();
      updateGameStateChip(getSessionLabel());
      hideOptionStrip();
      await requestAssistantReply();
    }

    async function requestAssistantReply() {
      setBusy(true, "thinking");
      hideOptionStrip();
      setStatus("模型正在思考…");
      ensureTurnDivider(state.currentTurnTimestamp);
      const placeholder = createThinkingMessage();

      try {
        const reader = await streamChat(buildRequestMessages());
        const { text, usageText } = await typewriterStreamToElement(reader, placeholder);
        applyWorldbookDraftFromText(text);
        applyStateUpdateFromText(text);
        state.messages.push({
          role: "assistant",
          content: text,
          turnTimestamp: state.currentTurnTimestamp || Date.now(),
          stage: state.sessionStage,
          assistantLabel: getAssistantLabel()
        });
        updateSummary();
        setStatus(usageText ? `回合完成，${usageText}` : "回合完成");
        saveState(true);
      } catch (err) {
        placeholder.remove();
        appendSystemMessage("错误：" + err.message);
        refreshOptionStrip();
        setStatus("调用失败，请检查模型配置或网络", true);
      } finally {
        setBusy(false);
        if (state.sessionStage === "worldbuild" && (isWorldbookReady() || hasReachedWorldbuildLimit())) {
          appendSystemMessage(isWorldbookReady() ? "世界观创建完成，正式剧情开始。" : `世界观问答达到 ${MAX_WORLDBUILD_ROUNDS} 轮上限，系统将采用当前设定进入剧情。`);
          await beginAdventureFromWorldbook(true);
          return;
        }
        refreshOptionStrip();
      }
    }

    async function startAdventure() {
      if (state.busy) return;
      const cfg = getConfig();
      if (!cfg.apiKey) {
        openSettings();
        setStatus("请先在设置里输入 API Key", true);
        return;
      }

      state.started = true;
      state.sessionStage = "worldbuild";
      state.worldbook = createInitialWorldbook(cfg);
      state.lastUserInput = "";
      state.currentTurnTimestamp = Date.now();
      state.messages = [
        {
          role: "user",
          hidden: true,
          stage: "worldbuild",
          turnTimestamp: state.currentTurnTimestamp,
          content: "开始新的游戏，先不要进入正式剧情。请作为造世者，与我一起创建本局世界。创建顺序必须先宏观、后微观。第一轮必须先问：这是什么类型的故事。并且每一轮只能问一个问题，不能在同一轮里同时要求玩家决定两个以上的信息。玩家只参与世界观和玩家自身角色的创建；关键 NPC、剧情走向、主线节点、人物关系发展、结局方向，都由你在后台自行构建，不要向玩家提问。先确认题材、整体基调和冲突方向，再逐步确定玩家名字、玩家身份、玩家性格倾向和初始状态。请先提出第一轮世界观构建问题，并提供 3-5 个选项。"
        }
      ];
      redrawLogFromState();
      appendSystemMessage(`已进入世界观创建阶段。你只需要参与世界观和自身角色设定，剧情与关键 NPC 由造世者在后台自行构建。`);
      updateSummary();
      updateGameStateChip(getSessionLabel());
      await requestAssistantReply();
    }

    async function sendTurn(text) {
      if (state.busy) return;
      if (!state.started) {
        setStatus("请先开始新冒险", true);
        return;
      }
      const userText = text.trim();
      if (!userText) return;

      state.lastUserInput = userText;
      state.currentTurnTimestamp = Date.now();
      state.messages.push({
        role: "user",
        content: userText,
        turnTimestamp: state.currentTurnTimestamp,
        stage: state.sessionStage
      });
      if (els.log.querySelector(".empty-state")) clearLog();
      ensureTurnDivider(state.currentTurnTimestamp);
      renderMessage("user", userText);
      els.playerInput.value = "";
      hideOptionStrip();

      if (state.sessionStage === "worldbuild" && isWorldbookReady() && isWorldbuildConfirmInput(userText)) {
        await beginAdventureFromWorldbook();
        return;
      }

      await requestAssistantReply();
    }

    async function retryLastTurn() {
      if (state.busy) return;
      if (!state.started) {
        setStatus("当前没有可重试的冒险", true);
        return;
      }

      while (state.messages.length && state.messages[state.messages.length - 1].role === "assistant") {
        state.messages.pop();
      }
      const lastUser = [...state.messages].reverse().find(msg => msg.role === "user");
      if (!lastUser) {
        setStatus("没有可重试的上一轮", true);
        return;
      }
      state.lastUserInput = lastUser.content;
      state.currentTurnTimestamp = lastUser.turnTimestamp || Date.now();
      redrawLogFromState();
      appendSystemMessage(`已移除上一条 ${getAssistantLabel(lastUser.stage || state.sessionStage)} 回复，正在重新生成…`);
      hideOptionStrip();
      await requestAssistantReply();
    }

    async function validateModel() {
      if (state.busy) return;
      const cfg = getConfig();
      if (!cfg.apiKey) {
        setStatus("请先输入 API Key", true);
        return;
      }

      els.validateBtn.disabled = true;
      els.validateStatus.textContent = "校验中…";
      setStatus("正在校验模型连接…");
      const startedAt = performance.now();

      try {
        const response = await fetch(cfg.apiBase, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${cfg.apiKey}`
          },
          body: JSON.stringify({
            model: cfg.modelName,
            messages: [
              { role: "system", content: "You are a validator." },
              { role: "user", content: "Reply with OK only." }
            ],
            temperature: 0,
            max_tokens: 8,
            stream: false
          })
        });

        if (!response.ok) {
          const details = await response.text().catch(() => "");
          throw new Error(`校验失败 (${response.status})${details ? " | " + details.slice(0, 240) : ""}`);
        }

        const data = await response.json();
        const reply = data?.choices?.[0]?.message?.content?.trim();
        if (!reply) throw new Error("接口可达，但返回为空");

        const ms = Math.round(performance.now() - startedAt);
        state.validation = {
          ok: true,
          checkedAt: `${ms}ms`,
          detail: `模型已校验 · ${ms}ms`
        };
        updateModelStatus();
        setStatus(`模型连接正常，耗时 ${ms}ms`);
        saveState(true);
      } catch (err) {
        state.validation = {
          ok: false,
          checkedAt: "",
          detail: err.message
        };
        updateModelStatus();
        setStatus(err.message, true);
      } finally {
        els.validateBtn.disabled = false;
      }
    }

    function exportTranscript() {
      const lines = [
        "=== 文字冒险记录 ===",
        `导出时间: ${new Date().toLocaleString()}`,
        ""
      ];

      for (const msg of state.messages) {
        if (msg.role === "system" || msg.hidden) continue;
        lines.push(`[${msg.role === "assistant" ? (msg.assistantLabel || "造世者") : (state.worldbook?.playerState?.name || "玩家")}]`);
        lines.push(msg.content);
        lines.push("");
      }

      const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `adventure-${Date.now()}.txt`;
      anchor.click();
      URL.revokeObjectURL(url);
      setStatus("已导出对话记录");
    }

    function clearAll() {
      if (!confirm("确定清空当前记录和本地存档吗？")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.started = false;
      state.sessionStage = "idle";
      state.messages = [];
      state.lastUserInput = "";
      state.currentTurnTimestamp = null;
      state.worldbook = null;
      state.validation = { ok: false, checkedAt: "", detail: "模型未校验" };
      state.optionPanelOpen = false;
      els.textSpeed.value = String(DEFAULT_TEXT_SPEED);
      updateTextSpeedLabel();
      updateModelStatus();
      updateSummary();
      updateGameStateChip(getSessionLabel());
      renderEmptyState();
      refreshOptionStrip();
      setStatus("已清空");
    }

    function bindAutoSave() {
      [
        els.apiKey,
        els.apiBase,
        els.modelName,
        els.textSpeed
      ].forEach(input => {
        input.addEventListener("input", () => {
          if (input === els.apiKey || input === els.apiBase || input === els.modelName) {
            state.validation = { ok: false, checkedAt: "", detail: "模型未校验" };
            updateModelStatus();
          }
          if (input === els.textSpeed) {
            updateTextSpeedLabel();
          }
          updateSummary();
          saveState(true);
        });
      });
    }

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !els.settingsModal.classList.contains("hidden")) {
        closeSettings();
      }
    });

    bindAutoSave();
    loadState();
    updateTextSpeedLabel();
    updateSummary();
    updateModelStatus();
    updateThemeButtons();
    refreshOptionStrip();
    if (!state.messages.length) renderEmptyState();
  </script>
</body>
</html>
